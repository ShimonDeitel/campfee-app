name: Campfee
options:
  bundleIdPrefix: com.shimondeitel.campsitefee
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Campfee:
    type: application
    platform: iOS
    sources:
      - path: Campfee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.campsitefee
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Campfee/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CampfeeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CampfeeTests
      - path: Campfee.storekit
    dependencies:
      - target: Campfee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.campsitefee.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CampfeeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CampfeeUITests
    dependencies:
      - target: Campfee
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.campsitefee.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Campfee:
    build:
      targets:
        Campfee: all
        CampfeeTests: [test]
        CampfeeUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Campfee.storekit
    test:
      config: Debug
      storeKitConfiguration: Campfee.storekit
      targets:
        - CampfeeTests
        - CampfeeUITests
    archive:
      config: Release
